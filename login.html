<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول</title>
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- CSS File -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body dir="rtl" class="login-body">
    <div class="login-overlay"></div>
    <form class="login-form" action="">
      <h1>تسجيل الدخول</h1>
      <input
        type="email"
        name="mail"
        id=""
        placeholder="ادخل الايميل الخاص بك"
        class="email-login-input"
        required
      />
      <p class="email-login-error"></p>
      <div class="pass-field">
        <input
          type="password"
          name="pass"
          id=""
          placeholder="ادخل كلمة السر الخاصة بك"
          class="pass-login-input"
          required
        />
        <div class="eye-icon"><i class="fa-solid fa-eye"></i></div>
      </div>
      <p class="pass-error"></p>
      <div class="buttons">
        <button class="login-btn">تسجيل الدخول</button>
        <button
          class="second-btn"
          onclick="location.href = 'index.html'"
          style="background-color: #fff; color: var(--main-color)"
        >
          التسجيل
        </button>
      </div>
    </form>
    <script src="main.js"></script>
  </body>
</html>
